<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regione — Programma vs Realtà</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="regnav" id="regnav"><!-- popolata da app.js --></nav>

  <div class="wrap">
    <header class="dash">
      <div class="stemma" id="stemma"></div>
      <h1 id="h1"></h1>
      <p class="sub" id="sub"></p>
      <p class="meta" id="meta"></p>
      <span class="pres" id="pres"></span>
    </header>

    <div class="stats" id="stats"><!-- conteggi per stato, cliccabili --></div>

    <div class="tools">
      <input type="search" id="search" placeholder="Cerca indicatore…">
      <div class="chips" id="chips"><!-- filtri per area --></div>
    </div>
    <p class="hint" id="hint"></p>

    <main class="grid" id="grid"><!-- schede KPI --></main>

    <footer id="footer"></footer>
  </div>

  <!-- Dati: Governo nazionale + una Regione per file (il motore usa solo quello richiesto da ?r=) -->
  <script src="governo.js"></script>
  <script src="piemonte.js"></script>
  <script src="valledaosta.js"></script>
  <script src="lombardia.js"></script>
  <script src="trentinoaltoadige.js"></script>
  <script src="veneto.js"></script>
  <script src="friuliveneziagiulia.js"></script>
  <script src="liguria.js"></script>
  <script src="emiliaromagna.js"></script>
  <script src="toscana.js"></script>
  <script src="umbria.js"></script>
  <script src="marche.js"></script>
  <script src="lazio.js"></script>
  <script src="abruzzo.js"></script>
  <script src="molise.js"></script>
  <script src="campania.js"></script>
  <script src="puglia.js"></script>
  <script src="basilicata.js"></script>
  <script src="calabria.js"></script>
  <script src="sicilia.js"></script>
  <script src="sardegna.js"></script>
  <!-- Motore -->
  <script src="app.js"></script>
</body>
</html>
